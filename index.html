<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Altify CleanText</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #F9FAFB;
      color: #111827;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      text-align: center;
      padding: 80px 0 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .subtext {
      color: #6B7280;
      margin-bottom: 24px;
    }

    .btn {
      background: #2563EB;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
    }

    .tool {
      margin-top: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #E5E7EB;
    }

    textarea {
      width: 100%;
      height: 220px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #E5E7EB;
    }

    select {
      width: 100%;
      margin-top: 16px;
      height: 40px;
    }

    .submit-btn {
      margin-top: 16px;
      width: 100%;
      height: 44px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .output {
      min-height: 220px;
      background: #F3F4F6;
      padding: 16px;
      border-radius: 8px;
    }

    #paywall {
      display: none;
      text-align: center;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .tool {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>Clean Up Messy AI Text Instantly</h1>
    <p class="subtext">Altify CleanText turns raw AI output into structured content.</p>
  </div>

  <div class="tool">

    <div class="card">
      <textarea id="inputText" placeholder="Paste your text..."></textarea>

      <select id="formatType">
        <option>Blog</option>
        <option>Summary</option>
        <option>Social</option>
      </select>

      <button id="submitBtn" class="submit-btn">Format Text</button>
    </div>

    <div class="card">
      <div id="outputText" class="output">Your formatted text will appear here</div>

      <button id="copyBtn" class="submit-btn">Copy Text</button>
    </div>

  </div>

  <div id="paywall">
    <h2>Unlock Lifetime Access</h2>
    <button onclick="window.location.href='YOUR_STRIPE_LINK'" class="submit-btn">
      Unlock for $12
    </button>
  </div>

</div>

<script>
  const ACCESS_KEY = "altify_access_key_v1";
  const ACCESS_VALUE = "active_7821";

  if (window.location.search.includes("paid=true")) {
    localStorage.setItem(ACCESS_KEY, ACCESS_VALUE);
    window.history.replaceState({}, document.title, "/");
  }

  let usageCount = parseInt(localStorage.getItem("usageCount")) || 0;
  let firstUse = localStorage.getItem("firstUse");

  if (!firstUse) {
    firstUse = Date.now();
    localStorage.setItem("firstUse", firstUse);
  }

  const THREE_DAYS = 3 * 24 * 60 * 60 * 1000;

  function isExpired() {
    return Date.now() - firstUse > THREE_DAYS;
  }

  function isPaidUser() {
    return localStorage.getItem(ACCESS_KEY) === ACCESS_VALUE;
  }

  document.getElementById("submitBtn").onclick = async function () {
    const outputBox = document.getElementById("outputText");

    if ((usageCount >= 5 || isExpired()) && !isPaidUser()) {
      outputBox.innerText = "Free limit reached. Unlock access.";
      document.getElementById("paywall").style.display = "block";
      return;
    }

    const text = document.getElementById("inputText").value;
    const format = document.getElementById("formatType").value;

    outputBox.innerText = "Formatting...";

    const res = await fetch("/api/format", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text, format })
    });

    const data = await res.json();
    outputBox.innerText = data.output;

    if (!isPaidUser()) {
      usageCount++;
      localStorage.setItem("usageCount", usageCount);
    }
  };

  document.getElementById("copyBtn").onclick = function () {
    const text = document.getElementById("outputText").innerText;
    navigator.clipboard.writeText(text);
  };
</script>

</body>
</html>
