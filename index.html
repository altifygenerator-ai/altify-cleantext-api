<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Altify CleanText – Clean & Format AI Text Instantly</title>
  <meta name="description" content="Clean and format messy AI-generated text instantly. Turn ChatGPT output into blogs, summaries, and social content.">
  <meta name="keywords" content="AI text formatter, clean AI text, ChatGPT formatting tool">
  <meta name="robots" content="index, follow">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #F9FAFB;
      color: #111827;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      text-align: center;
      padding: 80px 0 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .subtext {
      color: #6B7280;
      margin-bottom: 24px;
    }

    .btn {
      background: #2563EB;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:hover {
      background: #1D4ED8;
    }

    .tool {
      margin-top: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #E5E7EB;
    }

    label {
      font-size: 14px;
      color: #6B7280;
      display: block;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 220px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #E5E7EB;
      resize: none;
      font-family: inherit;
    }

    select {
      width: 100%;
      margin-top: 16px;
      height: 40px;
      border-radius: 8px;
    }

    .submit-btn {
      margin-top: 16px;
      width: 100%;
      height: 44px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .output {
      min-height: 220px;
      background: #F3F4F6;
      padding: 16px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    #usageDisplay {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: #6B7280;
    }

    #paywall {
      display: none;
      margin-top: 24px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .tool {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- HERO -->
    <div class="hero">
      <h1>Clean Up Messy AI Text Instantly</h1>
      <p class="subtext">
        Altify CleanText turns raw AI output into structured, publish-ready content in seconds.
      </p>
      <button class="btn">Try It Now</button>
      <p style="margin-top:12px; font-size:14px; color:#6B7280;">
        Part of the Altify Accessibility Toolkit
      </p>
    </div>

    <!-- TOOL -->
    <div class="tool">

      <div class="card">
        <label>Paste your text</label>
        <textarea id="inputText" placeholder="Paste your messy AI text here..."></textarea>

        <select id="formatType">
          <option>Blog</option>
          <option>Summary</option>
          <option>Social</option>
        </select>

        <button class="submit-btn" id="submitBtn">Format Text</button>
      </div>

      <div class="card">
        <label>Formatted result</label>
        <div class="output" id="outputText">
          Your formatted text will appear here
        </div>
      </div>

    </div>

    <!-- USAGE DISPLAY -->
    <div id="usageDisplay"></div>

    <!-- UNLOCK BUTTON -->
    <div style="text-align:center; margin-top:20px;">
      <a href="YOUR_STRIPE_PAYMENT_LINK_HERE">
        <button class="btn">Unlock Lifetime Access</button>
      </a>
    </div>

    <!-- PAYWALL -->
    <div id="paywall">
      <div class="card">
        <h3>Free limit reached</h3>
        <p style="color:#6B7280;">
          Unlock unlimited formatting with a one-time payment.
        </p>

        <a href="YOUR_STRIPE_PAYMENT_LINK_HERE">
          <button class="btn">Unlock Now</button>
        </a>
      </div>
    </div>

  </div>

  <script>
    const MAX_FREE = 5;
    const TRIAL_DAYS = 3;

    function isPaidUser() {
      return localStorage.getItem("altify_access_key_v1") === "active_7821";
    }

    function getUsage() {
      return parseInt(localStorage.getItem("usageCount") || "0");
    }

    function setUsage(count) {
      localStorage.setItem("usageCount", count);
    }

    function getFirstUse() {
      return parseInt(localStorage.getItem("firstUse") || "0");
    }

    function setFirstUse() {
      if (!localStorage.getItem("firstUse")) {
        localStorage.setItem("firstUse", Date.now());
      }
    }

    function isTrialExpired() {
      const first = getFirstUse();
      if (!first) return false;
      return (Date.now() - first) > (TRIAL_DAYS * 86400000);
    }

    function updateUI() {
      const usage = getUsage();

      document.getElementById("usageDisplay").innerText =
        isPaidUser()
          ? "Unlimited access enabled"
          : `${MAX_FREE - usage} free uses left`;
    }

    document.getElementById("submitBtn").onclick = async function () {
      const text = document.getElementById("inputText").value;
      const format = document.getElementById("formatType").value;
      const outputBox = document.getElementById("outputText");

      if (!text) {
        outputBox.innerText = "Please enter some text.";
        return;
      }

      setFirstUse();

      if (!isPaidUser()) {
        if (getUsage() >= MAX_FREE || isTrialExpired()) {
          document.getElementById("paywall").style.display = "block";
          document.getElementById("paywall").scrollIntoView({ behavior: "smooth" });
          return;
        }
      }

      outputBox.innerText = "Formatting...";

      try {
        const res = await fetch("https://altify-cleantext-api.vercel.app/api/format", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text, format })
        });

        const data = await res.json();
        outputBox.innerText = data.output || "No response.";

        if (!isPaidUser()) {
          setUsage(getUsage() + 1);
        }

        updateUI();

      } catch (err) {
        outputBox.innerText = "Error processing request.";
      }
    };

    // Payment unlock
    if (window.location.search.includes("paid=true")) {
      localStorage.setItem("altify_access_key_v1", "active_7821");
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    updateUI();
  </script>

</body>
</html>
