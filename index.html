<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Altify CleanText</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #F9FAFB;
      color: #111827;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .hero {
      text-align: center;
      padding: 80px 0 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .subtext {
      color: #6B7280;
      margin-bottom: 24px;
    }

    .tool {
      margin-top: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #E5E7EB;
    }

    textarea {
      width: 100%;
      height: 220px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #E5E7EB;
      resize: none;
    }

    select {
      width: 100%;
      margin-top: 16px;
      height: 40px;
      border-radius: 8px;
    }

    .submit-btn {
      margin-top: 16px;
      width: 100%;
      height: 44px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .output {
      min-height: 220px;
      background: #F3F4F6;
      padding: 16px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>Clean Up Messy AI Text Instantly</h1>
    <p class="subtext">Turn raw AI output into clean, readable content in seconds.</p>
  </div>

  <div class="tool">

    <div class="card">
      <textarea id="inputText" placeholder="Paste your messy AI text here..."></textarea>

      <select id="formatType">
        <option>Blog</option>
        <option>Summary</option>
        <option>Social</option>
      </select>

      <button class="submit-btn" id="submitBtn">Format Text</button>
    </div>

    <div class="card">
      <div class="output" id="outputText">
        Your formatted text will appear here
      </div>
    </div>

  </div>

  <!-- PAYWALL -->
  <div id="paywall" style="display:none;margin-top:40px;text-align:center;">
    <h2>Free Limit Reached</h2>
    <p>Unlock unlimited access</p>

    <button onclick="window.location.href='YOUR_STRIPE_LINK'"
      style="margin-top:16px;background:#2563EB;color:white;padding:12px 24px;border:none;border-radius:8px;">
      Unlock for $12
    </button>
  </div>

</div>

<script>
  let usageCount = parseInt(localStorage.getItem("usageCount")) || 0;

  document.getElementById("submitBtn").onclick = async function () {
    const text = document.getElementById("inputText").value;
    const format = document.getElementById("formatType").value;
    const outputBox = document.getElementById("outputText");

    if (!text) {
      outputBox.innerText = "Please enter some text.";
      return;
    }

    if (usageCount >= 5) {
      document.getElementById("paywall").style.display = "block";
      return;
    }

    outputBox.innerText = "Formatting...";

    try {
      const res = await fetch("/api/format", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text, format })
      });

      const data = await res.json();
      outputBox.innerText = data.output || "No response.";

      usageCount++;
      localStorage.setItem("usageCount", usageCount);

    } catch (err) {
      outputBox.innerText = "Error processing request.";
    }
  };
</script>

</body>
</html>
  </script>

</body>
</html>
